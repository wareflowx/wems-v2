name: Release Windows Build

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Extract version from tag
        id: version
        run: |
          $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          Write-Output "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding UTF8 -Append

      - name: Update package.json version
        run: |
          $currentVersion = (Get-Content package.json | ConvertFrom-Json).version
          if ($currentVersion -ne '${{ steps.version.outputs.VERSION }}') {
            npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version
          } else {
            Write-Output "Version already set to $currentVersion"
          }

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules
        run: npm run rebuild

      - name: Build application
        run: npm run build

      - name: Package for Windows
        run: npm run package -- --win --publish never

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.zip
            dist/**/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
