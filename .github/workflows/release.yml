name: Release Windows Build

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Extract version from tag
        id: version
        run: |
          $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          Write-Output "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding UTF8 -Append

      - name: Update package.json version
        run: |
          $currentVersion = (Get-Content package.json | ConvertFrom-Json).version
          if ($currentVersion -ne '${{ steps.version.outputs.VERSION }}') {
            npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version
          } else {
            Write-Output "Version already set to $currentVersion"
          }

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules
        run: npm run rebuild

      - name: Clean build folders
        run: |
          $failed = $false
          foreach ($dir in @("dist", "out")) {
            if (Test-Path $dir) {
              Write-Output "Removing $dir..."
              Remove-Item -Recurse -Force $dir -ErrorAction Stop
              if ($LASTEXITCODE -ne 0) { $failed = $true }
            }
          }
          foreach ($path in @(
            "$env:LOCALAPPDATA/electron-builder/Cache",
            "$env:APPDATA/electron-builder"
          )) {
            if (Test-Path $path) {
              Write-Output "Removing $path..."
              Remove-Item -Recurse -Force $path -ErrorAction Stop
              if ($LASTEXITCODE -ne 0) { $failed = $true }
            }
          }
          if ($failed) { exit 1 }

      - name: Verify clean dist
        run: |
          if ((Test-Path "dist") -and (Get-ChildItem "dist" -File | Where-Object { $_.Name -match '\.(exe|zip)$' })) {
            Write-Output "ERROR: Stale artifacts found in dist:"
            Get-ChildItem "dist" -File | Where-Object { $_.Name -match '\.(exe|zip)$' } | Format-Table Name,Length,LastWriteTime
            exit 1
          }
          Write-Output "Dist is clean."

      - name: Build application
        run: npm run build

      - name: Package for Windows
        run: npm run package -- --win --publish never

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*Setup*.exe
            dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
